  <style>
    /* ——— STYLES REMAIN UNCHANGED ——— */
    :root {
      --bg: #05070b;
      --bg-alt: #0b1018;
      --accent: #4ff2c9;
      --accent-soft: rgba(79, 242, 201, 0.12);
      --accent-strong: #00ffc3;
      --text: #f5f7fb;
      --muted: #9aa4c2;
      --danger: #ff4b81;
      --ok: #4ff28a;
      --border: #1b2233;
      --card-radius: 14px;
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.55);
      --mono: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      font-family: var(--sans);
      background: radial-gradient(circle at top, #10182a 0, #05070b 55%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    nav {
      width: 100%;
      background: #0b1018;
      border-bottom: 1px solid #1b2233;
      padding: 12px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      font-size: 14px;
    }

    nav a {
      color: var(--accent-strong);
      text-decoration: none;
      font-weight: 500;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .page { max-width: 1120px; margin: 0 auto; padding: 32px 20px 64px; }
    header { display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 40px; }
    .brand { display: flex; flex-direction: column; gap: 8px; }
    .brand-badge { display: inline-flex; align-items: center; gap: 8px; padding: 4px 10px; border-radius: 999px; background: linear-gradient(90deg, rgba(79, 242, 201, 0.12), rgba(0, 255, 195, 0.04)); border: 1px solid rgba(79, 242, 201, 0.35); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-strong); }
    .brand-badge span.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 10px rgba(79, 242, 138, 0.9); }
    h1 { margin: 0; font-size: 32px; letter-spacing: 0.04em; text-transform: uppercase; }
    h1 span { color: var(--accent-strong); }
    .subtitle { margin-top: 4px; font-size: 14px; color: var(--muted); max-width: 520px; }
    .header-meta { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; text-align: right; font-size: 12px; color: var(--muted); }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .pill { padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); background: rgba(8, 12, 20, 0.9); color: var(--muted); }
    main { display: grid; grid-template-columns: minmax(0, 2.1fr) minmax(0, 1.4fr); gap: 24px; }
    @media (max-width: 900px) { main { grid-template-columns: minmax(0, 1fr); } .header-meta { align-items: flex-start; text-align: left; } .pill-row { justify-content: flex-start; } }
    section { margin-bottom: 26px; }
    .card { background: radial-gradient(circle at top left, rgba(79, 242, 201, 0.08), transparent 55%), linear-gradient(145deg, #05070b, #05070b 40%, #05070b 100%); border-radius: var(--card-radius); border: 1px solid var(--border); box-shadow: var(--shadow-soft); padding: 18px 18px 16px; position: relative; overflow: hidden; }
    .card::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(0, 255, 195, 0.06), transparent 55%); opacity: 0.9; pointer-events: none; }
    .card-inner { position: relative; z-index: 1; }
    .card-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .card-title { font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
    .card-tag { font-size: 11px; padding: 3px 8px; border-radius: 999px; border: 1px solid rgba(154, 164, 194, 0.5); color: var(--muted); }
    .hero-metric-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 6px; }
    .metric { flex: 1 1 120px; min-width: 0; padding: 10px 10px 8px; border-radius: 10px; background: rgba(5, 9, 16, 0.9); border: 1px solid rgba(79, 242, 201, 0.25); }
    .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
    .metric-value { font-size: 18px; font-family: var(--mono); color: var(--accent-strong); }
    .metric-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .text-block { font-size: 13px; line-height: 1.6; color: var(--muted); }
    .text-block strong { color: var(--text); font-weight: 600; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip { font-size: 11px; padding: 3px 8px; border-radius: 999px; border: 1px solid rgba(154, 164, 194, 0.4); color: var(--muted); background: rgba(7, 10, 18, 0.9); }
    .log-stream { font-family: var(--mono); font-size: 11px; line-height: 1.5; background: #05070b; border-radius: 10px; border: 1px solid #151b28; padding: 10px 10px 9px; color: #c5d0f5; max-height: 260px; overflow: auto; white-space: pre; }
    .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 11px; color: var(--muted); }
    .log-status { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; background: rgba(10, 18, 10, 0.9); border: 1px solid rgba(79, 242, 138, 0.4); color: var(--ok); }
    .log-status span.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px rgba(79, 242, 138, 0.9); }
    .badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 999px; border: 1px solid rgba(154, 164, 194, 0.5); color: var(--muted); }
    .badge.ok { border-color: rgba(79, 242, 138, 0.7); color: var(--ok); }
    .kv-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 14px; margin-top: 6px; font-size: 12px; color: var(--muted); }
    .kv-label { text-transform: uppercase; letter-spacing: 0.12em; font-size: 10px; color: #7f8ab0; }
    .kv-value { font-family: var(--mono); color: var(--text); font-size: 12px; }
    .footer { margin-top: 32px; padding-top: 18px; border-top: 1px solid #151b28; font-size: 11px; color: var(--muted); display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; }
    .footer span.highlight { color: var(--accent-strong); }
